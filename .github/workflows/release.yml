# Build & Publish signed Release APK
#
# How it works:
#   1. Push a tag like `v1.0.9` → triggers this workflow
#   2. Decodes your keystore from a GitHub secret
#   3. Builds a signed release APK
#   4. Creates a GitHub Release with the APK attached
#
# Required repository secrets:
#   - KEYSTORE_BASE64    : base64-encoded keystore file  (base64 -i your.keystore | pbcopy)
#   - KEYSTORE_PASSWORD  : keystore password
#   - KEY_ALIAS          : signing key alias
#   - KEY_PASSWORD       : signing key password

name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > ${{ github.workspace }}/release.keystore

      - name: Create keystore.properties
        run: |
          cat > keystore.properties <<EOF
          storeFile=${{ github.workspace }}/release.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF
          sed -i 's/^[[:space:]]*//' keystore.properties

      - name: Build signed Release APK
        run: ./gradlew assembleRelease -x lintVitalAnalyzeRelease -x lintVitalReportRelease

      - name: Rename APK with version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/castla-${VERSION}.apk

      - name: Upload APK to existing Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          # Delete source archives (zip/tar) from release
          for asset_id in $(gh api repos/${{ github.repository }}/releases/tags/${GITHUB_REF_NAME} --jq '.assets[] | select(.name | test("Source code")) | .id' 2>/dev/null); do
            gh api repos/${{ github.repository }}/releases/assets/${asset_id} -X DELETE 2>/dev/null || true
          done
          # Upload APK to the release
          gh release upload ${GITHUB_REF_NAME} app/build/outputs/apk/release/castla-${VERSION}.apk --clobber

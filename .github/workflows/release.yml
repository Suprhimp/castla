# Build & Publish signed Release APK
#
# How it works:
#   1. Push to master (merge PR) → triggers this workflow
#   2. Reads versionName from app/build.gradle.kts
#   3. Decodes your keystore from a GitHub secret
#   4. Builds a signed release APK
#   5. Creates a GitHub Release with the APK attached
#
# Required repository secrets:
#   - KEYSTORE_BASE64    : base64-encoded keystore file  (base64 -i your.keystore | pbcopy)
#   - KEYSTORE_PASSWORD  : keystore password
#   - KEY_ALIAS          : signing key alias
#   - KEY_PASSWORD       : signing key password

name: Build & Release APK

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from build.gradle.kts
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION_NAME}" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > ${{ github.workspace }}/release.keystore

      - name: Create keystore.properties
        run: |
          cat > keystore.properties <<EOF
          storeFile=${{ github.workspace }}/release.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF
          sed -i 's/^[[:space:]]*//' keystore.properties

      - name: Build signed Release APK
        run: ./gradlew assembleRelease

      - name: Upload APK to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          APK_NAME="castla-${VERSION}.apk"
          mv "$APK_PATH" "app/build/outputs/apk/release/${APK_NAME}"

          if [ "${{ steps.check.outputs.exists }}" = "true" ]; then
            gh release upload "${TAG}" \
              "app/build/outputs/apk/release/${APK_NAME}" --clobber
            gh release edit "${TAG}" --latest
          else
            gh release create "${TAG}" \
              --title "${TAG}" \
              --generate-notes \
              --latest \
              "app/build/outputs/apk/release/${APK_NAME}"
          fi

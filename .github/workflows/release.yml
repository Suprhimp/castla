# Build & Publish signed Release APK
#
# How it works:
#   1. Push to master (merge PR) → triggers this workflow
#   2. Checks the merged PR's labels to decide version bump:
#        - "major" label  → 1.2.3 → 2.0.0
#        - "minor" label  → 1.2.3 → 1.3.0
#        - "patch" label  → 1.2.3 → 1.2.4  (also the default fallback)
#   3. Decodes your keystore from a GitHub secret
#   4. Builds a signed release APK with the new version
#   5. Creates a GitHub Release with the APK attached
#
# Required repository secrets:
#   - KEYSTORE_BASE64    : base64-encoded keystore file  (base64 -i your.keystore | pbcopy)
#   - KEYSTORE_PASSWORD  : keystore password
#   - KEY_ALIAS          : signing key alias
#   - KEY_PASSWORD       : signing key password

name: Build & Release APK

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect bump type from merged PR labels
        id: bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the PR associated with this merge commit
          COMMIT_SHA="${{ github.sha }}"
          LABELS=$(gh pr list --state merged --search "$COMMIT_SHA" --json labels -q '.[0].labels[].name' 2>/dev/null || echo "")

          if echo "$LABELS" | grep -qi "major"; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -qi "minor"; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi
          echo "Bump type: $(grep type "$GITHUB_OUTPUT" | cut -d= -f2)"

      - name: Determine next version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get latest release tag (fallback to v0.0.0 if none exists)
          LATEST=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          LATEST="${LATEST#v}"
          echo "Previous release: $LATEST"

          # Parse semver
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
          BUMP="${{ steps.bump.outputs.type }}"

          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          VERSION="${MAJOR}.${MINOR}.${PATCH}"

          # Use GitHub run number as versionCode (always increasing)
          VERSION_CODE=${{ github.run_number }}

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "Next release: v${VERSION} (code: ${VERSION_CODE}, bump: ${BUMP})"

      - name: Inject version into build.gradle.kts
        run: |
          sed -i "s/versionCode = .*/versionCode = ${{ steps.version.outputs.code }}/" app/build.gradle.kts
          sed -i "s/versionName = \".*\"/versionName = \"${{ steps.version.outputs.version }}\"/" app/build.gradle.kts
          echo "Updated build.gradle.kts:"
          grep -E 'versionCode|versionName' app/build.gradle.kts

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > ${{ github.workspace }}/release.keystore

      - name: Create keystore.properties
        run: |
          cat > keystore.properties <<EOF
          storeFile=${{ github.workspace }}/release.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF
          sed -i 's/^[[:space:]]*//' keystore.properties

      - name: Build signed Release APK
        run: ./gradlew assembleRelease

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          APK_NAME="castla-${VERSION}.apk"
          mv "$APK_PATH" "app/build/outputs/apk/release/${APK_NAME}"

          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes \
            --latest \
            "app/build/outputs/apk/release/${APK_NAME}"

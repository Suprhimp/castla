<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Castla</title>
    <link rel="stylesheet" href="css/player.css">
    <style>
        /* Web Native Launcher Styles */
        #web-launcher {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #0F0F1A;
            z-index: 200; /* Above the video player */
            overflow-y: auto;
            display: flex; /* Flexbox for full centering if needed, but we use block with padding */
            flex-direction: column;
            padding: 30px;
            color: #fff;
            font-family: sans-serif;
            transition: opacity 0.3s ease;
        }

        #web-launcher.hidden {
            display: none !important;
            opacity: 0;
            pointer-events: none;
        }

        #launcher-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.15);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
            font-family: sans-serif;
        }

        .category-section {
            margin-bottom: 24px;
        }

        .category-header {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .category-bar {
            width: 6px;
            height: 24px;
            border-radius: 3px;
            margin-right: 12px;
        }

        .category-title {
            font-size: 20px;
            font-weight: bold;
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 16px;
        }

        .app-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            cursor: pointer;
            padding: 12px 8px;
            border-radius: 12px;
            transition: background 0.2s ease;
        }

        .app-cell:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .app-icon {
            width: 72px;
            height: 72px;
            object-fit: contain;
            margin-bottom: 8px;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.5));
            transition: transform 0.1s ease;
        }

        .app-cell:active .app-icon {
            transform: scale(0.95);
        }

        .app-label {
            font-size: 13px;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            color: #ddd;
        }

        /* ── Split Launcher Drawer (Dual App) ── */
        #split-drawer {
            position: absolute;
            top: 0; bottom: 0; right: -300px;
            width: 300px;
            background: rgba(20, 20, 30, 0.95);
            backdrop-filter: blur(10px);
            z-index: 260;
            transition: right 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: -4px 0 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            color: white;
            font-family: sans-serif;
            display: none; /* hidden during launcher mode */
        }
        #split-drawer.open {
            right: 0;
        }

        #split-handle {
            position: absolute;
            left: -28px;
            top: 50%;
            transform: translateY(-50%);
            width: 28px;
            height: 80px;
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 14px 0 0 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: -2px 0 8px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-right: none;
            user-select: none;
            -webkit-user-select: none;
        }

        .handle-dots {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-right: 2px;
        }

        .handle-dot {
            width: 4px;
            height: 4px;
            background-color: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
        }

        .split-drawer-header {
            padding: 20px;
            font-size: 18px;
            font-weight: bold;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
        }
        .close-drawer {
            cursor: pointer;
            font-size: 20px;
        }
        .split-app-list {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            flex: 1;
        }
        .split-app-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            background: rgba(255,255,255,0.05);
        }
        .split-app-item:hover {
            background: rgba(255,255,255,0.15);
        }
        .split-app-icon {
            width: 40px; height: 40px;
            margin-right: 12px;
            object-fit: contain;
        }

        /* ── Bubble Composer ── */
        #input-bubble {
            position: fixed;
            z-index: 9999;
            display: none;
            flex-direction: row;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 20px;
            background: rgba(30, 30, 40, 0.95);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 90vw;
        }
        #input-bubble.visible {
            display: flex !important;
        }
        #input-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid rgba(30, 30, 40, 0.92);
        }
        #bubble-text {
            flex: 1;
            min-width: 160px;
            max-width: 50vw;
            height: 36px;
            padding: 0 12px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 16px;
            outline: none;
            caret-color: #64B5F6;
        }
        #bubble-text::placeholder { color: rgba(255,255,255,0.35); }
        #bubble-text:focus { border-color: #64B5F6; }
        .bubble-btn {
            height: 36px;
            padding: 0 16px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
        }
        #bubble-submit {
            background: #64B5F6;
            color: #111;
        }
        #bubble-submit:active { background: #42A5F5; }
        #bubble-cancel {
            background: rgba(255,255,255,0.12);
            color: #ccc;
        }
        #bubble-cancel:active { background: rgba(255,255,255,0.2); }
        #bubble-backspace {
            background: rgba(255,80,80,0.2);
            color: #ff8080;
            padding: 0 12px;
            font-size: 18px;
        }
        #bubble-backspace:active { background: rgba(255,80,80,0.35); }

        #splash-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #0a0a12;
            z-index: 1000;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            opacity: 1;
            transition: opacity 0.5s ease;
        }
        #splash-screen.hidden {
            opacity: 0; pointer-events: none;
        }
        #splash-screen.removed {
            display: none !important;
        }
        #splash-logo {
            width: 80px;
            height: auto;
            margin-bottom: 40px;
            opacity: 0.85;
        }
        #splash-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            opacity: 1;
            transition: opacity 0.3s ease;
        }
        #splash-loading.hidden {
            opacity: 0; pointer-events: none;
        }
        .splash-spinner {
            width: 28px;
            height: 28px;
            border: 2.5px solid rgba(255, 255, 255, 0.1);
            border-top-color: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .splash-loading-text {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 15px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 0.5px;
        }
        #splash-unmute {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 0;
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        #splash-unmute.visible {
            display: flex;
            opacity: 1;
        }
        .splash-tap-text {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 28px;
            font-weight: 200;
            color: rgba(255, 255, 255, 0.75);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        #player-shell {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: stretch;
            justify-content: stretch;
            --split-left-width: 42%;
        }
        #stream-pane {
            position: relative;
            width: 100%;
            min-width: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            transition: width 0.2s ease;
            background: #000;
        }
        #player-shell.browser-split #stream-pane {
            width: var(--split-left-width);
        }
        #browser-split-pane {
            position: relative;
            display: none;
            width: calc(100% - var(--split-left-width));
            min-width: 280px;
            height: 100%;
            background: #05070d;
            border-left: 1px solid rgba(255,255,255,0.08);
            overflow: hidden;
        }
        #player-shell.browser-split #browser-split-pane {
            display: block;
        }
        #display,
        #mse-video,
        #display-secondary {
            width: 100%;
            height: 100%;
            display: block;
        }
        #display-secondary {
            background: #111;
        }
        #player-shell.browser-split #display-secondary {
            display: block;
        }

        /* ── Browser-Only Split Pane ── */
        .browser-pane-ui {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            background: #0a0c14;
        }
        .browser-pane-toolbar {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 10px;
            background: rgba(20, 22, 35, 0.95);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            flex-shrink: 0;
        }
        .browser-url-input {
            flex: 1;
            height: 34px;
            padding: 0 12px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            background: rgba(255,255,255,0.06);
            color: #fff;
            font-size: 14px;
            outline: none;
            min-width: 0;
        }
        .browser-url-input:focus { border-color: #64B5F6; }
        .browser-url-input::placeholder { color: rgba(255,255,255,0.3); }
        .browser-toolbar-btn {
            height: 34px;
            padding: 0 12px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: #ccc;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .browser-toolbar-btn:active { background: rgba(255,255,255,0.2); }
        .browser-toolbar-btn.go-btn { background: #64B5F6; color: #111; font-weight: 600; }
        .browser-toolbar-btn.go-btn:active { background: #42A5F5; }
        .browser-presets {
            display: flex;
            gap: 6px;
            padding: 8px 10px;
            overflow-x: auto;
            flex-shrink: 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .browser-preset-btn {
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            color: #ddd;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .browser-preset-btn:hover { background: rgba(255,255,255,0.12); }
        .browser-preset-btn.active { background: rgba(100,181,246,0.2); border-color: #64B5F6; color: #64B5F6; }
        .browser-iframe-wrap {
            flex: 1;
            position: relative;
            overflow: hidden;
            min-height: 0;
        }
        .browser-iframe-wrap iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }
        .browser-loading {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(10,12,20,0.9);
            z-index: 2;
        }
        .browser-loading.hidden { display: none; }
        .browser-error {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            z-index: 3;
            text-align: center;
            padding: 20px;
        }
        .browser-error.visible { display: flex; }
        .browser-home-state {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            color: rgba(255,255,255,0.4);
            font-size: 15px;
        }
        .browser-home-state.hidden { display: none; }
        #split-divider {
            position: absolute;
            top: 0;
            bottom: 0;
            left: calc(var(--split-left-width) - 10px);
            width: 20px;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 230;
            cursor: col-resize;
            touch-action: none;
        }
        #player-shell.browser-split #split-divider {
            display: none;
        }
        #split-divider::before {
            content: '';
            width: 4px;
            height: 72px;
            border-radius: 999px;
            background: rgba(255,255,255,0.35);
            box-shadow: 0 0 0 1px rgba(0,0,0,0.35);
        }
        #split-toolbar-tap-zone {
            display: none;
            position: absolute;
            top: 0;
            left: 30%;
            width: 40%;
            height: 48px;
            z-index: 230;
            cursor: pointer;
            pointer-events: none;
        }
        #player-shell.browser-split #split-toolbar-tap-zone,
        #player-shell.freeform-split #split-toolbar-tap-zone {
            display: block;
        }
        #split-pane-toolbar {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 231;
            display: none;
            gap: 5px;
            align-items: center;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 999px;
            padding: 4px 6px;
            opacity: 0;
            transition: opacity 0.25s ease;
            pointer-events: none;
        }
        #split-pane-toolbar.visible {
            opacity: 1;
            pointer-events: auto;
        }
        #player-shell.browser-split #split-pane-toolbar,
        #player-shell.freeform-split #split-pane-toolbar {
            display: flex;
        }
        .split-pane-btn {
            border: none;
            border-radius: 999px;
            padding: 6px 11px;
            background: rgba(255,255,255,0.10);
            color: rgba(255,255,255,0.75);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s, color 0.15s;
        }
        .split-pane-btn:hover { background: rgba(255,255,255,0.20); color: #fff; }
        .split-pane-btn.active {
            background: rgba(255,255,255,0.25);
            color: #fff;
            font-weight: 600;
        }
        .split-pane-btn.stop-btn {
            background: rgba(255,255,255,0.10);
            color: rgba(255,120,120,0.9);
            margin-left: 2px;
        }
        .split-pane-btn.stop-btn:hover { background: rgba(255,80,80,0.4); color: #fff; }
        .split-toolbar-sep {
            width: 1px;
            height: 16px;
            background: rgba(255,255,255,0.15);
            margin: 0 1px;
        }
    </style>
</head>
<body>
    <div id="container">

        <div id="splash-screen">
            <img id="splash-logo" src="img/logo.svg" alt="Castla">
            <div id="splash-loading">
                <div class="splash-spinner"></div>
                <span class="splash-loading-text">Loading...</span>
            </div>
            <div id="splash-unmute">
                <span class="splash-tap-text">Tap to Start</span>
            </div>
        </div>

        <!-- Web Native Launcher UI -->
        <div id="web-launcher">
            <div id="launcher-loading">
                <div class="loading-spinner"></div>
                <div class="loading-text">Loading apps...</div>
            </div>
            <div id="launcher-content" style="display:none;"></div>
        </div>

        <!-- Split Drawer triggers & UI -->
        <div id="split-drawer">
            <div id="split-handle">
                <div class="handle-dots">
                    <div class="handle-dot"></div>
                    <div class="handle-dot"></div>
                    <div class="handle-dot"></div>
                </div>
            </div>
            <div class="split-drawer-header">
                <span>Split Screen Apps</span>
                <span class="close-drawer" onclick="document.getElementById('split-drawer').classList.remove('open')">&times;</span>
            </div>
            <div class="split-app-list" id="split-app-list"></div>
        </div>

        <div id="player-shell">
            <div id="stream-pane">
                <canvas id="display"></canvas>
                <video id="mse-video" muted autoplay playsinline></video>
            </div>
            <div id="split-divider" aria-hidden="true"></div>
            <div id="browser-split-pane">
                <canvas id="display-secondary"></canvas>
                <div class="browser-pane-ui" id="browser-pane-ui">
                    <div class="browser-pane-toolbar">
                        <input id="browser-url-input" class="browser-url-input" type="url" placeholder="URL..." autocomplete="off" autocorrect="off" spellcheck="false">
                        <button id="browser-go-btn" class="browser-toolbar-btn go-btn">Go</button>
                        <button id="browser-refresh-btn" class="browser-toolbar-btn">&#x21BB;</button>
                    </div>
                    <div class="browser-presets" id="browser-presets"></div>
                    <div class="browser-iframe-wrap" id="browser-iframe-wrap">
                        <div class="browser-home-state" id="browser-home-state">
                            <span>Select a site or enter a URL</span>
                        </div>
                        <iframe id="browser-iframe" allow="autoplay; encrypted-media; fullscreen; picture-in-picture" referrerpolicy="no-referrer-when-downgrade"></iframe>
                        <div class="browser-loading hidden" id="browser-loading">
                            <div class="loading-spinner"></div>
                        </div>
                        <div class="browser-error" id="browser-error">
                            <span>This site cannot be embedded.</span>
                            <button class="browser-toolbar-btn" id="browser-error-close">Close</button>
                        </div>
                    </div>
                </div>
            </div>
            <div id="split-toolbar-tap-zone"></div>
            <div id="split-pane-toolbar">
                <button class="split-pane-btn split-ratio-btn" data-ratio="0.3">3:7</button>
                <button class="split-pane-btn split-ratio-btn" data-ratio="0.4">4:6</button>
                <button class="split-pane-btn split-ratio-btn active" data-ratio="0.5">5:5</button>
                <button class="split-pane-btn split-ratio-btn" data-ratio="0.6">6:4</button>
                <button class="split-pane-btn split-ratio-btn" data-ratio="0.7">7:3</button>
                <div class="split-toolbar-sep"></div>
                <button id="split-close-btn" class="split-pane-btn stop-btn">종료</button>
            </div>
        </div>
        <div id="overlay">
            <div id="status">Connecting...</div>
            <div id="stats"></div>
        </div>

        <input id="keyboard-input" type="text" autocomplete="off" autocorrect="off"
               autocapitalize="off" spellcheck="false"
               style="position:fixed;top:-100px;left:0;width:1px;height:1px;opacity:0;pointer-events:none;z-index:-1;">
        <div id="input-bubble">
            <input id="bubble-text" type="text" placeholder="입력..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
            <button id="bubble-submit" class="bubble-btn">입력</button>
            <button id="bubble-backspace" class="bubble-btn">&#x232B;</button>
            <button id="bubble-cancel" class="bubble-btn">취소</button>
        </div>

        <button id="home-btn" title="Home"
                style="position:fixed;bottom:12px;left:12px;z-index:201;width:48px;height:48px;
                       border-radius:50%;border:none;background:rgba(0,0,0,0.6);
                       color:#fff;font-size:24px;cursor:pointer;backdrop-filter:blur(4px);
                       display:none;box-shadow:0 4px 6px rgba(0,0,0,0.3);">
                &#x1F3E0;
        </button>

        <div id="density-control"
             style="position:fixed;bottom:12px;left:72px;z-index:201;display:none;">
            <button id="density-btn"
                    style="height:48px;padding:0 14px;border-radius:24px;border:none;
                           background:rgba(0,0,0,0.6);color:#fff;font-size:13px;
                           font-weight:500;cursor:pointer;backdrop-filter:blur(4px);
                           box-shadow:0 4px 6px rgba(0,0,0,0.3);
                           font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
                           white-space:nowrap;display:flex;align-items:center;gap:6px;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="14" rx="2" ry="2"/>
                    <line x1="8" y1="20" x2="16" y2="20"/>
                    <line x1="12" y1="18" x2="12" y2="20"/>
                </svg>
                <span id="density-label">Small</span>
            </button>
            <div id="density-popup"
                 style="position:absolute;bottom:56px;left:0;
                        background:rgba(20,20,30,0.95);backdrop-filter:blur(10px);
                        border-radius:12px;padding:6px;display:none;
                        box-shadow:0 8px 24px rgba(0,0,0,0.5);
                        border:1px solid rgba(255,255,255,0.1);
                        min-width:140px;">
            </div>
        </div>

        <!-- Auto Tier Toast -->
        <div id="auto-tier-toast"
             style="position:fixed;top:20px;left:50%;transform:translateX(-50%);
                    z-index:300;padding:10px 20px;border-radius:12px;
                    background:rgba(20,20,30,0.9);backdrop-filter:blur(10px);
                    color:rgba(255,255,255,0.9);font-size:14px;font-weight:500;
                    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
                    box-shadow:0 4px 16px rgba(0,0,0,0.4);
                    border:1px solid rgba(255,255,255,0.1);
                    opacity:0;pointer-events:none;
                    transition:opacity 0.3s ease;white-space:nowrap;">
        </div>

        <!-- Playback Profile Control -->
        <div id="playback-profile-control"
             style="position:fixed;bottom:12px;right:12px;z-index:201;display:none;">
            <button id="playback-profile-btn"
                    style="height:48px;padding:0 14px;border-radius:24px;border:none;
                           background:rgba(0,0,0,0.6);color:#fff;font-size:13px;
                           font-weight:500;cursor:pointer;backdrop-filter:blur(4px);
                           box-shadow:0 4px 6px rgba(0,0,0,0.3);
                           font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
                           white-space:nowrap;display:flex;align-items:center;gap:6px;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5 3 19 12 5 21 5 3"/>
                </svg>
                <span id="playback-profile-label">Balanced</span>
            </button>
            <div id="playback-profile-popup"
                 style="position:absolute;bottom:56px;right:0;
                        background:rgba(20,20,30,0.95);backdrop-filter:blur(10px);
                        border-radius:12px;padding:6px;display:none;
                        box-shadow:0 8px 24px rgba(0,0,0,0.5);
                        border:1px solid rgba(255,255,255,0.1);
                        min-width:160px;">
            </div>
        </div>

    </div>

    <script src="js/decoder.js"></script>
    <script src="js/mse-decoder.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/frame-pacer.js"></script>
    <script src="js/touch.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/fallback.js"></script>
    <script src="js/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Castla - Connect</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            text-align: center;
            padding: 48px 40px;
            background: #1a1a1a;
            border-radius: 20px;
            max-width: 360px;
            width: 90%;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 4px;
            color: #bb86fc;
        }
        .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 32px;
        }
        label {
            display: block;
            color: #aaa;
            font-size: 13px;
            margin-bottom: 12px;
        }
        .pin-input {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 24px;
        }
        .pin-input input {
            width: 56px;
            height: 64px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            border: 2px solid #333;
            border-radius: 12px;
            background: #222;
            color: #fff;
            outline: none;
            caret-color: #bb86fc;
        }
        .pin-input input:focus {
            border-color: #bb86fc;
        }
        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            background: #bb86fc;
            color: #000;
            cursor: pointer;
        }
        button:disabled {
            opacity: 0.4;
            cursor: default;
        }
        .error {
            color: #f44336;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Castla</h1>
        <p class="subtitle">Enter the PIN shown on your phone</p>
        <label>4-digit PIN</label>
        <div class="pin-input">
            <input type="tel" maxlength="1" inputmode="numeric" autofocus>
            <input type="tel" maxlength="1" inputmode="numeric">
            <input type="tel" maxlength="1" inputmode="numeric">
            <input type="tel" maxlength="1" inputmode="numeric">
        </div>
        <button id="connect" disabled>Connect</button>
        <p class="error" id="error">Wrong PIN. Try again.</p>
    </div>

    <script>
    (function() {
        const inputs = document.querySelectorAll('.pin-input input');
        const btn = document.getElementById('connect');
        const errorEl = document.getElementById('error');

        function getPin() {
            return Array.from(inputs).map(i => i.value).join('');
        }

        function updateButton() {
            btn.disabled = getPin().length < 4;
        }

        inputs.forEach((input, idx) => {
            input.addEventListener('input', () => {
                errorEl.style.display = 'none';
                if (input.value.length === 1 && idx < inputs.length - 1) {
                    inputs[idx + 1].focus();
                }
                updateButton();
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && input.value === '' && idx > 0) {
                    inputs[idx - 1].focus();
                }
                if (e.key === 'Enter') {
                    btn.click();
                }
            });
        });

        btn.addEventListener('click', () => {
            const pin = getPin();
            if (pin.length < 4) return;
            // Navigate to the stream page with pin — server will validate
            window.location.href = '/?pin=' + encodeURIComponent(pin);
        });

        // If we landed here after a wrong pin attempt (redirected back), show error
        if (document.referrer && document.referrer.includes('pin=')) {
            errorEl.style.display = 'block';
        }
    })();
    </script>
</body>
</html>
